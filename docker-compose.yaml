
services:
  bot:
    build: .
    container_name: promo-bot
    depends_on:
      redis:
        condition: service_healthy
      postgresql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgresql
    networks:
      - bot-network
    restart: unless-stopped

  redis:
    image: redis:6-alpine
    container_name: promo-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - bot-network
    restart: unless-stopped

  postgresql:
    image: postgres:14-alpine
    container_name: promo-postgresql
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - bot-network
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:

networks:
  bot-network:
    driver: bridge