services:
  bot:
    build: .
    image: mikebangsfilya/promobot
    container_name: promo-bot
    user: "10001:10001"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgresql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - API_TOKEN
      - DEBUG
      - COMMAND_STATE_TTL
      - APP_PORT
      - APP_PATH
      - REDIS_HOST=redis
      - REDIS_PORT
      - REDIS_PASSWORD
      - POSTGRES_HOST=postgresql
      - POSTGRES_PORT
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - WEBHOOK_HOST
      - WEBHOOK_PORT
      - WEBHOOK_PATH
      - USERS_CONFIG_FILE=/cfg/users.yaml
      - AUDIT_LOGS_DIR
    expose:
      - ${APP_PORT}
    volumes:
      - ./cfg:/cfg
      - ./audit-logs:/app/audit-logs
    networks:
      - promo-bot-network
    logging:
      driver: local

  redis:
    image: redis:6-alpine
    container_name: promo-redis
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_PORT
      - REDIS_PASSWORD
      - REDISCLI_AUTH=${REDIS_PASSWORD}
    command: redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD:?error} --port ${REDIS_PORT}
    expose:
      - ${REDIS_PORT}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -p $$REDIS_PORT -a $$REDIS_PASSWORD ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - promo-bot-network
    logging:
      driver: local

  postgresql:
    image: postgres:14-alpine
    container_name: promo-postgresql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_PORT
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    expose:
      - ${POSTGRES_PORT}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - promo-bot-network
    logging:
      driver: local

volumes:
  redis_data:
  postgres_data:

networks:
  promo-bot-network:
    driver: bridge
